<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="header">
      <h1 class="header__title">Portal</h1>
      <p class="header__sub" id="userEmail"></p>
    </header>

    <p id="errorBox" class="error" hidden role="alert"></p>

    <section id="viewLogin" class="panel">
      <h2>Iniciar sessão</h2>
      <form id="formLogin" class="form">
        <label class="field">
          <span class="field__label">Email</span>
          <input type="email" id="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span class="field__label">Palavra-passe</span>
          <input type="password" id="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn btn--primary">Entrar</button>
      </form>
    </section>

    <section id="viewApps" class="panel" hidden>
      <div class="panel__head">
        <h2>As tuas aplicações</h2>
        <button type="button" class="btn btn--ghost" id="btnLogout">Sair</button>
      </div>
      <div id="appList" class="app-list"></div>
    </section>

    <footer class="footer">
      <p class="muted">Sessão gerida pelo Supabase · Acessos definidos pelo administrador</p>
    </footer>
  </div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
